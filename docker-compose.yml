version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://finops_user:finops_pass@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlnT1Nc0cPHnCR5gJOlGDg=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-finops-secret-key-2025}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    POSTGRES_CONN: postgresql+psycopg2://finops_user:finops_pass@postgres/finops
    SPARK_MASTER_URL: spark://spark-master:7077
  volumes:
    - ./dags:/opt/airflow/dags
    - ./notebooks:/opt/airflow/notebooks
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
    - ivy_cache:/home/airflow/.ivy2
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - finops_net

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — fonte de dados + gold serving
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finops_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops_user -d finops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finops_net

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finops_net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/datalake &&
        mc anonymous set none local/datalake &&
        echo 'MinIO bucket created'
      "
    networks:
      - finops_net

  # ─────────────────────────────────────────────
  # Apache Spark
  # ─────────────────────────────────────────────
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"   # Spark master
      - "8080:8080"   # Spark Web UI
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - spark_jars:/opt/spark/jars/extra
      - ivy_cache:/root/.ivy2
    networks:
      - finops_net

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - spark_jars:/opt/spark/jars/extra
      - ivy_cache:/root/.ivy2
    networks:
      - finops_net

  # ─────────────────────────────────────────────
  # JupyterLab — desenvolvimento e exploração
  # ─────────────────────────────────────────────
  jupyter:
    build:
      context: ./spark
      dockerfile: Dockerfile
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --NotebookApp.token=''
        --NotebookApp.password=''
        --notebook-dir=/opt/spark/notebooks
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-finops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finops_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finops}
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - spark_jars:/opt/spark/jars/extra
      - ivy_cache:/root/.ivy2
    depends_on:
      - spark-master
    networks:
      - finops_net

  # ─────────────────────────────────────────────
  # Apache Airflow
  # ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install apache-airflow-providers-papermill pyspark==3.5.1 delta-spark==3.2.0 psycopg2-binary &&
        airflow db migrate &&
        airflow users create
          --username admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@finops.local
          --password admin123
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install apache-airflow-providers-papermill pyspark==3.5.1 delta-spark==3.2.0 psycopg2-binary &&
        airflow webserver
      "
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install apache-airflow-providers-papermill pyspark==3.5.1 delta-spark==3.2.0 psycopg2-binary &&
        airflow scheduler
      "
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # Metabase — BI
  # ─────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finops_net

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  airflow_plugins:
  spark_jars:
  ivy_cache:
  metabase_data:

networks:
  finops_net:
    driver: bridge
